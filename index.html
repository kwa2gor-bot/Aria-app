<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ARIA" />
  <meta name="theme-color" content="#080d12" />
  <meta name="description" content="Ton assistant de travail intelligent" />
  <title>ARIA – Assistant IA</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #080d12;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.07);
      --teal: #00b4a0;
      --teal2: #00d4bc;
      --blue: #3060d0;
      --text: #d0e4f0;
      --muted: #4a6070;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%; height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
      position: relative;
      overflow: hidden;
    }

    /* Background */
    .bg-mesh {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 80% 50% at 15% 10%, rgba(0,180,160,.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 70% at 85% 85%, rgba(50,70,200,.08) 0%, transparent 60%);
      animation: bgmove 18s ease-in-out infinite;
    }
    @keyframes bgmove { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,-15px)} }

    /* Header */
    header {
      position: relative; z-index: 10;
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px 10px;
      border-bottom: 1px solid var(--border);
      background: rgba(8,13,18,.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      flex-shrink: 0;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 20px; font-weight: 800;
      background: linear-gradient(135deg, #00d4bc, #4a6ae0);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: .08em;
    }

    .logo-sub { font-size: 10px; color: #2a3e50; letter-spacing: .06em; }

    .header-stats {
      margin-left: auto;
      display: flex; gap: 12px;
    }
    .hstat { font-size: 11px; color: var(--muted); }
    .hstat b { font-family: 'Syne', sans-serif; font-size: 13px; color: var(--teal); font-weight: 700; }

    /* Tabs */
    nav {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: rgba(8,13,18,.8);
      flex-shrink: 0;
      position: relative; z-index: 10;
    }
    .tab-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 2px;
      padding: 9px 4px;
      background: none; border: none; border-bottom: 2px solid transparent;
      color: #2a4050; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 10px; transition: all .2s;
    }
    .tab-btn .ti { font-size: 19px; }
    .tab-btn.active { color: var(--teal); border-bottom-color: var(--teal); background: rgba(0,180,160,.05); }

    /* Content */
    .content { flex: 1; overflow: hidden; display: flex; flex-direction: column; position: relative; z-index: 1; }

    /* ===== CHAT ===== */
    .chat-wrap { display: flex; flex-direction: column; height: 100%; overflow: hidden; }

    .messages {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 16px 0;
      -webkit-overflow-scrolling: touch;
    }
    .messages-inner { max-width: 680px; margin: 0 auto; padding: 0 14px; display: flex; flex-direction: column; gap: 14px; }

    .msg-row { display: flex; gap: 8px; animation: fadeUp .25s ease; }
    .msg-row.user { justify-content: flex-end; align-items: flex-end; }
    .msg-row.assistant { align-items: flex-start; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    .avatar {
      width: 28px; height: 28px; border-radius: 7px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700; color: #fff;
      background: linear-gradient(135deg, #00b4a0, #3060d0);
    }
    .avatar.user-av { background: rgba(255,255,255,.07); color: #4a6070; font-size: 8px; }

    .bubble {
      max-width: 80%; padding: 11px 14px; font-size: 14px; line-height: 1.65;
    }
    .bubble.user { background: rgba(0,180,160,.11); border: 1px solid rgba(0,180,160,.2); border-radius: 14px 14px 3px 14px; color: #c0f0e8; }
    .bubble.assistant { background: var(--surface); border: 1px solid var(--border); border-radius: 3px 14px 14px 14px; color: #b8d0e0; }

    .bubble p { margin-bottom: 3px; }
    .bubble h2 { font-family:'Syne',sans-serif; font-size:13px; font-weight:600; color:var(--teal2); margin:6px 0 4px; }
    .bubble h3 { font-family:'Syne',sans-serif; font-size:11px; font-weight:600; color:#5a90a8; text-transform:uppercase; letter-spacing:.07em; margin:4px 0 3px; }
    .bubble .li { display:flex; gap:6px; margin-bottom:3px; }
    .bubble .li .bl { color:var(--teal); flex-shrink:0; }

    /* Typing */
    .typing { display: flex; gap: 5px; align-items: center; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--teal); animation: dotPulse 1.2s ease-in-out infinite; }
    @keyframes dotPulse { 0%,80%,100%{transform:scale(.6);opacity:.3} 40%{transform:scale(1);opacity:1} }

    /* Quick actions drawer */
    .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 50; backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); }
    .drawer {
      position: fixed; left: 0; right: 0; bottom: 0;
      z-index: 60; background: rgba(8,13,18,.98);
      border-top: 1px solid rgba(0,180,160,.15);
      border-radius: 20px 20px 0 0;
      padding: 0 0 calc(20px + var(--safe-bottom));
      transform: translateY(100%);
      transition: transform .32s cubic-bezier(.4,0,.2,1);
    }
    .drawer.open { transform: translateY(0); }
    .drawer-handle { width: 36px; height: 4px; background: rgba(255,255,255,.12); border-radius: 2px; margin: 14px auto 16px; }
    .drawer-title { font-family:'Syne',sans-serif; font-size:11px; font-weight:700; letter-spacing:.15em; text-transform:uppercase; color:var(--teal); padding: 0 16px 12px; }
    .drawer-list { display: flex; flex-direction: column; gap: 4px; padding: 0 12px; max-height: 55vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .drawer-item {
      display: flex; align-items: center; gap: 12px; padding: 13px 14px;
      background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.05);
      border-radius: 10px; cursor: pointer; color: #a0c0d0;
      font-size: 13px; font-family: 'DM Sans', sans-serif;
      text-align: left; transition: all .15s;
    }
    .drawer-item:active { background: rgba(0,180,160,.1); }
    .drawer-item .di { font-size: 18px; }
    .drawer-item .da { color: var(--teal); margin-left: auto; }

    /* Input */
    .input-area {
      padding: 10px 12px 12px;
      border-top: 1px solid var(--border);
      background: rgba(8,13,18,.92);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      flex-shrink: 0;
    }
    .input-box {
      display: flex; align-items: flex-end; gap: 8px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 14px; padding: 9px 10px;
    }
    .quick-btn { background: none; border: none; font-size: 17px; color: #3a5060; cursor: pointer; padding: 3px 2px; flex-shrink: 0; }
    #chat-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text); font-size: 15px; font-family: 'DM Sans', sans-serif;
      line-height: 1.4; max-height: 90px; overflow-y: auto; resize: none;
      -webkit-overflow-scrolling: touch;
    }
    #chat-input::placeholder { color: #2a4050; }
    .send-btn {
      width: 32px; height: 32px; border-radius: 8px; border: none; flex-shrink: 0;
      background: linear-gradient(135deg, var(--teal), var(--blue));
      color: #fff; font-size: 18px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity .2s;
    }
    .send-btn:disabled { opacity: 0.3; }
    .input-hint { text-align: center; font-size: 10px; color: #1a2a36; margin-top: 6px; letter-spacing: .04em; }

    /* ===== PANEL (Tasks, Calendar, Notes) ===== */
    .panel { flex: 1; overflow-y: auto; padding: 16px 14px; -webkit-overflow-scrolling: touch; }
    .panel-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
    .panel-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: #ddeeff; margin-bottom: 2px; }
    .panel-sub { font-size: 11px; color: var(--muted); }
    .ai-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 8px 12px;
      background: linear-gradient(135deg, rgba(0,180,160,.13), rgba(50,70,200,.13));
      border: 1px solid rgba(0,180,160,.22); border-radius: 9px;
      color: var(--teal2); font-size: 11px; font-weight: 600; cursor: pointer;
      font-family: 'DM Sans', sans-serif; white-space: nowrap;
    }

    .prog-bar { height: 2px; background: rgba(255,255,255,.07); border-radius: 1px; margin-bottom: 16px; overflow: hidden; }
    .prog-fill { height: 100%; background: linear-gradient(90deg, var(--teal), var(--blue)); border-radius: 1px; transition: width .5s ease; }

    .add-row { display: flex; gap: 7px; margin-bottom: 18px; flex-wrap: wrap; }
    .add-input {
      flex: 1; min-width: 140px; padding: 10px 13px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 9px; color: var(--text); font-size: 13px;
      font-family: 'DM Sans', sans-serif; outline: none;
    }
    .add-input::placeholder { color: #2a4050; }
    select.add-input { cursor: pointer; }
    .add-btn {
      padding: 10px 14px;
      background: linear-gradient(135deg, var(--teal), var(--blue));
      border: none; border-radius: 9px; color: #fff;
      font-size: 13px; font-weight: 600; cursor: pointer;
      font-family: 'DM Sans', sans-serif; white-space: nowrap;
    }

    .grp-label { font-size: 10px; font-family:'Syne',sans-serif; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:7px; margin-top:4px; }

    .task-card {
      display: flex; align-items: center; gap: 9px;
      padding: 12px 13px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; margin-bottom: 6px; transition: opacity .2s;
    }
    .task-card.done { opacity: .4; }
    .check-wrap { background: none; border: none; cursor: pointer; padding: 0; flex-shrink: 0; }
    .check-box {
      width: 20px; height: 20px; border-radius: 6px;
      border: 1.5px solid rgba(0,180,160,.35);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: #fff; transition: all .2s;
    }
    .check-box.checked { background: var(--teal); border-color: var(--teal); }
    .task-txt { flex: 1; font-size: 13px; color: #a8c0d0; }
    .task-txt.done-txt { text-decoration: line-through; }
    .task-tag { font-size: 10px; padding: 2px 8px; background: rgba(255,255,255,.06); border-radius: 20px; color: var(--muted); font-weight: 600; }
    .del-btn { background: none; border: none; cursor: pointer; color: #2a3e50; font-size: 18px; padding: 0 3px; }

    /* Calendar */
    .form-card { padding: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
    .meet-card { display: flex; gap: 12px; padding: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 8px; align-items: flex-start; }
    .meet-left { text-align: center; min-width: 72px; }
    .meet-date { font-size: 10px; color: var(--teal); font-weight: 600; margin-bottom: 2px; }
    .meet-time { font-family:'Syne',sans-serif; font-size: 15px; font-weight: 700; color: #e0eef8; margin-bottom: 2px; }
    .meet-dur { font-size: 9px; color: var(--muted); background: rgba(255,255,255,.06); padding: 2px 7px; border-radius: 20px; display: inline-block; }
    .meet-center { flex: 1; min-width: 0; }
    .meet-title { font-size: 13px; font-weight: 600; color: #c8e0f0; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .meet-att { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
    .meet-btns { display: flex; gap: 5px; flex-wrap: wrap; }
    .meet-btn {
      padding: 5px 10px; background: rgba(0,180,160,.09); border: 1px solid rgba(0,180,160,.18);
      border-radius: 7px; color: var(--teal); font-size: 10px; font-weight: 600;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
    }
    .meet-del { color: #ff7070; border-color: rgba(255,80,80,.2); background: rgba(255,80,80,.06); }

    /* Notes */
    .notes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .note-card { padding: 13px; background: var(--surface); border: 1px solid var(--border); border-radius: 0 12px 12px 12px; display: flex; flex-direction: column; gap: 7px; }
    .note-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 4px; }
    .note-title { font-family:'Syne',sans-serif; font-size: 12px; font-weight: 700; flex: 1; line-height: 1.3; }
    .note-date { font-size: 9px; color: #2a3e50; white-space: nowrap; }
    .note-content { font-size: 12px; color: #6a8898; line-height: 1.5; flex: 1; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
    .note-foot { display: flex; justify-content: space-between; margin-top: 2px; }
    .note-btn { background: none; border: none; cursor: pointer; font-size: 11px; color: #2a4050; padding: 3px 5px; border-radius: 5px; }

    /* Install banner */
    #install-banner {
      position: fixed; bottom: calc(0px + var(--safe-bottom)); left: 0; right: 0;
      z-index: 100; padding: 14px 16px;
      background: linear-gradient(135deg, rgba(0,180,160,.18), rgba(50,70,200,.18));
      border-top: 1px solid rgba(0,180,160,.3);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      display: flex; align-items: center; gap: 12px;
      animation: slideUp .4s ease;
    }
    @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
    #install-banner .ib-icon { font-size: 22px; }
    #install-banner .ib-text { flex: 1; font-size: 13px; line-height: 1.4; }
    #install-banner .ib-text b { color: var(--teal2); }
    #install-banner .ib-close { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 0 4px; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1a2a38; border-radius: 2px; }

    /* Textarea auto-height */
    textarea { overflow: hidden; }

    .row-pair { display: flex; gap: 7px; }
    .row-pair .add-input { min-width: 80px; }
  </style>
</head>
<body>
<div id="app">
  <div class="bg-mesh"></div>

  <!-- Header -->
  <header>
    <div>
      <div class="logo">ARIA</div>
      <div class="logo-sub">Assistant IA</div>
    </div>
    <div class="header-stats">
      <span class="hstat"><b id="stat-tasks">0</b> tâches</span>
      <span class="hstat"><b id="stat-meet">0</b> réunions</span>
      <span class="hstat"><b id="stat-notes">0</b> notes</span>
    </div>
  </header>

  <!-- Tabs -->
  <nav>
    <button class="tab-btn active" data-tab="chat"><span class="ti">💬</span>Assistant</button>
    <button class="tab-btn" data-tab="tasks"><span class="ti">📋</span>Tâches</button>
    <button class="tab-btn" data-tab="calendar"><span class="ti">📅</span>Réunions</button>
    <button class="tab-btn" data-tab="notes"><span class="ti">💡</span>Notes</button>
  </nav>

  <!-- Content -->
  <div class="content">

    <!-- CHAT -->
    <div id="tab-chat" class="chat-wrap">
      <div class="messages" id="messages">
        <div class="messages-inner" id="messages-inner"></div>
      </div>
      <div class="input-area">
        <div class="input-box">
          <button class="quick-btn" id="open-drawer">⚡</button>
          <textarea id="chat-input" placeholder="Décris ta tâche ou pose ta question…" rows="1"></textarea>
          <button class="send-btn" id="send-btn" disabled>↑</button>
        </div>
        <div class="input-hint">⚡ Actions rapides · Entrée pour envoyer</div>
      </div>
    </div>

    <!-- TASKS -->
    <div id="tab-tasks" class="panel" style="display:none">
      <div class="panel-header">
        <div>
          <div class="panel-title">Mes Tâches</div>
          <div class="panel-sub" id="task-sub">0/0 complétées</div>
        </div>
        <button class="ai-btn" id="ai-prioritize">🤖 Prioriser</button>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
      <div class="add-row">
        <input class="add-input" id="new-task-input" placeholder="Nouvelle tâche…" />
        <select class="add-input" id="new-task-pri" style="flex:0;min-width:0;padding:10px 8px;font-size:12px">
          <option>🔴 Urgent</option>
          <option>🟠 Important</option>
          <option selected>🟡 Normal</option>
          <option>🟢 Plus tard</option>
        </select>
        <button class="add-btn" id="add-task-btn">+</button>
      </div>
      <div id="task-list"></div>
    </div>

    <!-- CALENDAR -->
    <div id="tab-calendar" class="panel" style="display:none">
      <div class="panel-header">
        <div>
          <div class="panel-title">Réunions</div>
          <div class="panel-sub" id="meet-sub">0 planifiées</div>
        </div>
        <button class="ai-btn" id="ai-meeting">🤖 Préparer</button>
      </div>
      <div class="form-card">
        <input class="add-input" id="meet-title" placeholder="Titre de la réunion…" />
        <div class="row-pair">
          <input class="add-input" id="meet-date" placeholder="Date (ex: Lun 31)" />
          <input class="add-input" id="meet-time" placeholder="Heure (14:30)" />
        </div>
        <div class="row-pair">
          <select class="add-input" id="meet-dur">
            <option>30min</option><option>45min</option><option selected>1h</option><option>1h30</option><option>2h</option>
          </select>
          <button class="add-btn" id="add-meet-btn" style="flex:1">+ Ajouter</button>
        </div>
      </div>
      <div id="meet-list"></div>
    </div>

    <!-- NOTES -->
    <div id="tab-notes" class="panel" style="display:none">
      <div class="panel-header">
        <div>
          <div class="panel-title">Notes & Idées</div>
          <div class="panel-sub" id="notes-sub">0 notes</div>
        </div>
        <button class="ai-btn" id="ai-brain">🤖 Brainstorm</button>
      </div>
      <div class="form-card">
        <input class="add-input" id="note-title" placeholder="Titre…" />
        <textarea class="add-input" id="note-content" placeholder="Idées, points clés…" rows="3" style="resize:vertical;min-height:66px"></textarea>
        <button class="add-btn" id="add-note-btn" style="align-self:flex-end">+ Créer</button>
      </div>
      <div class="notes-grid" id="notes-grid"></div>
    </div>

  </div><!-- /content -->
</div><!-- /app -->

<!-- Quick Actions Drawer -->
<div id="drawer-overlay" class="drawer-overlay" style="display:none" onclick="closeDrawer()"></div>
<div id="drawer" class="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-title">⚡ Actions rapides</div>
  <div class="drawer-list" id="drawer-list"></div>
</div>

<!-- Install Banner (iOS) -->
<div id="install-banner" style="display:none">
  <span class="ib-icon">📲</span>
  <div class="ib-text">
    <b>Installer ARIA</b><br>
    Partager <span style="font-size:14px">⬆️</span> → "Sur l'écran d'accueil"
  </div>
  <button class="ib-close" onclick="document.getElementById('install-banner').style.display='none'">✕</button>
</div>

<script>
// =========== STATE ===========
const COLORS = ['#00b4a0','#5060e0','#e06050','#a060d0','#c09020'];
let state = {
  messages: [],
  tasks: [
    { id:1, text:'Préparer la présentation Q2', priority:'🔴 Urgent', done:false, tag:'Projet' },
    { id:2, text:'Relire le rapport annuel', priority:'🟠 Important', done:false, tag:'Revue' },
    { id:3, text:'Répondre aux emails clients', priority:'🟡 Normal', done:true, tag:'Comm.' },
  ],
  meetings: [
    { id:1, title:"Réunion d'équipe hebdo", date:'Lun 31 Mars', time:'09:00', duration:'1h', attendees:'Équipe' },
    { id:2, title:'Point client', date:'Mar 1 Avr', time:'14:30', duration:'45min', attendees:'Équipe + Client' },
  ],
  notes: [
    { id:1, title:'Idées stratégie 2025', content:'Expansion B2B, automatisation des process, recrutement tech', color:'#00b4a0', date:"Aujourd'hui" },
    { id:2, title:'Insights direction', content:'Priorité croissance. Budget R&D +20%. Lancement Q3.', color:'#5060e0', date:'Hier' },
  ],
  loading: false,
  activeTab: 'chat'
};

const SYSTEM_PROMPT = `Tu es ARIA, un assistant de travail personnel d'élite. Tu parles uniquement en français.
Spécialités : Tâches & projets, Calendrier & réunions, Notes & idées.
Style : Concis, structuré, actionnable. Utilise des émojis pour les sections. Propose toujours des étapes concrètes.
Formats : Plans de projet, matrices Eisenhower, ordres du jour, comptes-rendus, brainstorming.`;

const QUICK_ACTIONS = [
  { icon:'📋', label:'Décomposer une tâche', prompt:'Décompose cette tâche en sous-tâches actionnables : ' },
  { icon:'⚡', label:'Prioriser ma liste', prompt:'Priorise ces tâches selon Eisenhower : ' },
  { icon:'📅', label:'Ordre du jour', prompt:'Prépare un ordre du jour pour : ' },
  { icon:'📝', label:'Compte-rendu', prompt:'Rédige un compte-rendu. Points abordés : ' },
  { icon:'💡', label:'Brainstorming', prompt:'Lance un brainstorming structuré sur : ' },
  { icon:'🗂️', label:'Organiser mes notes', prompt:'Organise ces notes brouillon : ' },
  { icon:'📊', label:'Plan de projet', prompt:'Crée un plan de projet pour : ' },
  { icon:'⏰', label:'Time-blocking', prompt:'Aide-moi à organiser mon agenda : ' },
];

// =========== TABS ===========
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    state.activeTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    ['chat','tasks','calendar','notes'].forEach(t => {
      document.getElementById('tab-'+t).style.display = t === tab ? 'flex' : 'none';
      if (t === tab && t !== 'chat') document.getElementById('tab-'+t).style.display = 'block';
    });
    if (tab === 'tasks') renderTasks();
    if (tab === 'calendar') renderMeetings();
    if (tab === 'notes') renderNotes();
    updateStats();
  });
});

// =========== API ===========
async function callAPI(userMsg) {
  state.loading = true;
  const msgs = [...state.messages, { role:'user', content:userMsg }];
  state.messages = msgs;
  appendMsg('user', userMsg);
  updateSendBtn();

  const typingEl = appendTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: msgs
      })
    });
    const data = await res.json();
    const text = (data.content || []).map(b => b.text || '').join('') || 'Une erreur est survenue.';
    state.messages.push({ role:'assistant', content:text });
    typingEl.remove();
    appendMsg('assistant', text);
  } catch {
    typingEl.remove();
    appendMsg('assistant', '⚠️ Erreur de connexion. Vérifie ta connexion et réessaie.');
  } finally {
    state.loading = false;
    updateSendBtn();
  }
}

// =========== CHAT UI ===========
function appendMsg(role, text) {
  const inner = document.getElementById('messages-inner');
  const row = document.createElement('div');
  row.className = 'msg-row ' + role;

  if (role === 'assistant') {
    const av = document.createElement('div');
    av.className = 'avatar'; av.textContent = 'A';
    row.appendChild(av);
  }

  const bub = document.createElement('div');
  bub.className = 'bubble ' + role;
  bub.innerHTML = role === 'assistant' ? formatText(text) : `<p>${escHtml(text)}</p>`;
  row.appendChild(bub);

  if (role === 'user') {
    const av = document.createElement('div');
    av.className = 'avatar user-av'; av.textContent = 'Moi';
    row.appendChild(av);
  }

  inner.appendChild(row);
  scrollBottom();
}

function appendTyping() {
  const inner = document.getElementById('messages-inner');
  const row = document.createElement('div');
  row.className = 'msg-row assistant';
  const av = document.createElement('div'); av.className='avatar'; av.textContent='A';
  const bub = document.createElement('div'); bub.className='bubble assistant';
  const typing = document.createElement('div'); typing.className='typing';
  [0,150,300].forEach(d => {
    const dot = document.createElement('span');
    dot.className='dot'; dot.style.animationDelay=d+'ms';
    typing.appendChild(dot);
  });
  bub.appendChild(typing); row.appendChild(av); row.appendChild(bub);
  inner.appendChild(row); scrollBottom();
  return row;
}

function formatText(text) {
  return text.split('\n').map(line => {
    if (line.startsWith('## ')) return `<h2>${escHtml(line.slice(3))}</h2>`;
    if (line.startsWith('# ')) return `<h2>${escHtml(line.slice(2))}</h2>`;
    if (line.startsWith('### ')) return `<h3>${escHtml(line.slice(4))}</h3>`;
    if (line.startsWith('- ') || line.startsWith('• ')) return `<div class="li"><span class="bl">◦</span>${escHtml(line.slice(2))}</div>`;
    if (/^\d+\./.test(line)) return `<div class="li"><span class="bl">${line.match(/^\d+/)[0]}.</span>${escHtml(line.replace(/^\d+\./,'').trim())}</div>`;
    if (line === '') return '<br>';
    const bold = escHtml(line).replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    return `<p>${bold}</p>`;
  }).join('');
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function scrollBottom() { const m=document.getElementById('messages'); setTimeout(()=>m.scrollTop=m.scrollHeight,50); }
function updateSendBtn() { document.getElementById('send-btn').disabled = state.loading || !document.getElementById('chat-input').value.trim(); }

// Input
const chatInput = document.getElementById('chat-input');
chatInput.addEventListener('input', () => { updateSendBtn(); autoResize(chatInput); });
chatInput.addEventListener('keydown', e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); doSend(); } });
document.getElementById('send-btn').addEventListener('click', doSend);

function doSend() {
  const val = chatInput.value.trim();
  if (!val || state.loading) return;
  chatInput.value = ''; autoResize(chatInput); updateSendBtn();
  callAPI(val);
}

function autoResize(el) {
  el.style.height='auto';
  el.style.height = Math.min(el.scrollHeight, 90)+'px';
}

function sendToChat(prompt) {
  chatInput.value = prompt;
  autoResize(chatInput); updateSendBtn();
  // switch to chat tab
  document.querySelector('[data-tab="chat"]').click();
  chatInput.focus();
}

// =========== DRAWER ===========
const drawerEl = document.getElementById('drawer');
const drawerOverlay = document.getElementById('drawer-overlay');

document.getElementById('open-drawer').addEventListener('click', openDrawer);
function openDrawer() {
  drawerOverlay.style.display='block';
  setTimeout(()=>drawerEl.classList.add('open'),10);
  renderDrawer();
}
function closeDrawer() {
  drawerEl.classList.remove('open');
  setTimeout(()=>drawerOverlay.style.display='none',320);
}

function renderDrawer() {
  const list = document.getElementById('drawer-list');
  list.innerHTML = QUICK_ACTIONS.map((a,i) =>
    `<button class="drawer-item" onclick="useAction(${i})">
      <span class="di">${a.icon}</span>
      <span>${a.label}</span>
      <span class="da">→</span>
    </button>`
  ).join('');
}

function useAction(i) {
  closeDrawer();
  setTimeout(()=>{ sendToChat(QUICK_ACTIONS[i].prompt); },350);
}

// =========== TASKS ===========
function renderTasks() {
  const list = document.getElementById('task-list');
  const priorities = ['🔴 Urgent','🟠 Important','🟡 Normal','🟢 Plus tard'];
  const done = state.tasks.filter(t=>t.done).length;
  const total = state.tasks.length;
  document.getElementById('task-sub').textContent = `${done}/${total} complétées`;
  document.getElementById('prog-fill').style.width = total ? `${(done/total)*100}%` : '0%';

  list.innerHTML = priorities.map(pri => {
    const grp = state.tasks.filter(t=>t.priority===pri);
    if (!grp.length) return '';
    return `<div class="grp-label">${pri} <span style="color:#2a3e50;font-weight:400">(${grp.filter(t=>!t.done).length} restantes)</span></div>` +
      grp.map(t=>`
        <div class="task-card ${t.done?'done':''}">
          <button class="check-wrap" onclick="toggleTask(${t.id})">
            <div class="check-box ${t.done?'checked':''}">✓</div>
          </button>
          <span class="task-txt ${t.done?'done-txt':''}">${escHtml(t.text)}</span>
          <span class="task-tag">${t.tag}</span>
          <button class="del-btn" onclick="deleteTask(${t.id})">×</button>
        </div>`).join('');
  }).join('');
  updateStats();
}

document.getElementById('add-task-btn').addEventListener('click', addTask);
document.getElementById('new-task-input').addEventListener('keydown', e => { if(e.key==='Enter') addTask(); });

function addTask() {
  const val = document.getElementById('new-task-input').value.trim();
  if (!val) return;
  state.tasks.push({ id:Date.now(), text:val, priority:document.getElementById('new-task-pri').value, done:false, tag:'Tâche' });
  document.getElementById('new-task-input').value='';
  renderTasks();
}
function toggleTask(id) { state.tasks = state.tasks.map(t=>t.id===id?{...t,done:!t.done}:t); renderTasks(); }
function deleteTask(id) { state.tasks = state.tasks.filter(t=>t.id!==id); renderTasks(); }

document.getElementById('ai-prioritize').addEventListener('click', () => {
  const list = state.tasks.filter(t=>!t.done).map(t=>t.text).join(', ');
  sendToChat(`Priorise ces tâches selon la matrice Eisenhower : ${list}`);
});

// =========== MEETINGS ===========
function renderMeetings() {
  const list = document.getElementById('meet-list');
  document.getElementById('meet-sub').textContent = `${state.meetings.length} planifiées`;
  list.innerHTML = state.meetings.map(m=>`
    <div class="meet-card">
      <div class="meet-left">
        <div class="meet-date">${escHtml(m.date)}</div>
        <div class="meet-time">${escHtml(m.time)}</div>
        <div class="meet-dur">${m.duration}</div>
      </div>
      <div class="meet-center">
        <div class="meet-title">${escHtml(m.title)}</div>
        <div class="meet-att">👥 ${escHtml(m.attendees)}</div>
        <div class="meet-btns">
          <button class="meet-btn" onclick="sendToChat('Prépare un ordre du jour pour : ${escHtml(m.title).replace(/'/g,"\\'")}')">📋 Ordre du jour</button>
          <button class="meet-btn" onclick="sendToChat('Rédige un compte-rendu pour : ${escHtml(m.title).replace(/'/g,"\\'")}')">📝 CR</button>
          <button class="meet-btn meet-del" onclick="deleteMeeting(${m.id})">×</button>
        </div>
      </div>
    </div>`).join('');
  updateStats();
}

document.getElementById('add-meet-btn').addEventListener('click', addMeeting);
function addMeeting() {
  const title = document.getElementById('meet-title').value.trim();
  if (!title) return;
  state.meetings.push({ id:Date.now(), title, date:document.getElementById('meet-date').value||'À définir', time:document.getElementById('meet-time').value||'--:--', duration:document.getElementById('meet-dur').value, attendees:'À définir' });
  ['meet-title','meet-date','meet-time'].forEach(id=>document.getElementById(id).value='');
  renderMeetings();
}
function deleteMeeting(id) { state.meetings=state.meetings.filter(m=>m.id!==id); renderMeetings(); }

document.getElementById('ai-meeting').addEventListener('click', ()=>sendToChat('Prépare un ordre du jour pour ma prochaine réunion : '));

// =========== NOTES ===========
function renderNotes() {
  const grid = document.getElementById('notes-grid');
  document.getElementById('notes-sub').textContent = `${state.notes.length} notes`;
  grid.innerHTML = state.notes.map(n=>`
    <div class="note-card" style="border-top:3px solid ${n.color}">
      <div class="note-top">
        <div class="note-title" style="color:${n.color}">${escHtml(n.title)}</div>
        <div class="note-date">${n.date}</div>
      </div>
      <p class="note-content">${escHtml(n.content)}</p>
      <div class="note-foot">
        <button class="note-btn" onclick="sendToChat('Enrichis cette note : ${escHtml(n.title).replace(/'/g,"\\'")} - ${escHtml(n.content).replace(/'/g,"\\'").substring(0,80)}')">🤖 Enrichir</button>
        <button class="note-btn" onclick="deleteNote(${n.id})">🗑️</button>
      </div>
    </div>`).join('');
  updateStats();
}

document.getElementById('add-note-btn').addEventListener('click', addNote);
function addNote() {
  const title=document.getElementById('note-title').value.trim();
  if (!title) return;
  state.notes.unshift({ id:Date.now(), title, content:document.getElementById('note-content').value, color:COLORS[Math.floor(Math.random()*COLORS.length)], date:'Maintenant' });
  document.getElementById('note-title').value='';
  document.getElementById('note-content').value='';
  renderNotes();
}
function deleteNote(id) { state.notes=state.notes.filter(n=>n.id!==id); renderNotes(); }
document.getElementById('ai-brain').addEventListener('click',()=>sendToChat('Lance un brainstorming structuré sur : '));

// =========== STATS ===========
function updateStats() {
  document.getElementById('stat-tasks').textContent = state.tasks.filter(t=>!t.done).length;
  document.getElementById('stat-meet').textContent = state.meetings.length;
  document.getElementById('stat-notes').textContent = state.notes.length;
}

// =========== INIT ===========
async function init() {
  updateStats();
  // Initial greeting
  const typingEl = appendTyping();
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1000, system:SYSTEM_PROMPT,
        messages:[{role:'user',content:'Présente-toi en 2 phrases percutantes, mentionne tes 3 spécialités (tâches, réunions, notes) et demande comment tu peux m\'aider aujourd\'hui.'}]
      })
    });
    const data = await res.json();
    const text = (data.content||[]).map(b=>b.text||'').join('')||'Bonjour ! Je suis ARIA, ton assistant IA. Comment puis-je t\'aider ?';
    state.messages.push({role:'assistant',content:text});
    typingEl.remove();
    appendMsg('assistant',text);
  } catch {
    typingEl.remove();
    appendMsg('assistant','👋 Bonjour ! Je suis ARIA, ton assistant de travail. Connecte-toi à internet pour que je puisse t\'aider pleinement.');
  }

  // Service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }

  // iOS install banner (show after 3s if not in standalone)
  if (!window.navigator.standalone && /iphone|ipad|ipod/i.test(navigator.userAgent)) {
    setTimeout(()=>{ document.getElementById('install-banner').style.display='flex'; }, 3000);
  }
}

init();
</script>
